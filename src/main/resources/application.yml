server:
  port: 8080

spring:
  application:
    name: sentinel-trade
  datasource:
    url: jdbc:postgresql://localhost:5432/sentineldb
    username: ${DB_USERNAME:sentinel}
    password: ${DB_PASSWORD:sentinel}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

sentinel:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars}
    expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: INFO
    com.bank.sentinel: DEBUG
  # PII masking placeholder — configure logback-spring.xml with masking rules
